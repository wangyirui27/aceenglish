<title>60秒排位赛</title>
<style>
:root {
  --accent: #FF600F;
  --accent-hover: #E85500;
  --accent-light: #FF7A33;
  --accent-dark: #CC4D0C;
  --accent-glow: rgba(255, 96, 15, 0.3);
  --accent-subtle: rgba(255, 96, 15, 0.1);
  --accent-gradient: linear-gradient(135deg, #FF600F, #FF7A33);
  --accent-gradient-h: linear-gradient(90deg, #FF600F, #FFB800);

  --bg-0: #000000;
  --bg-1: #111111;
  --bg-2: #1A1A1A;
  --bg-3: #222222;
  --bg-accent: #2A1508;

  --secondary: #FFB800;
  --success: #00C853;
  --info: #448AFF;

  --text-1: #FFFFFF;
  --text-2: #AAAAAA;
  --text-3: #666666;
  --text-accent: #FF600F;

  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;

  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 999px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "PingFang SC", Arial, sans-serif;
  background: var(--bg-0);
  color: var(--text-1);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.page {
  max-width: 402px;
  margin: 0 auto;
  padding: 0 16px 100px;
  min-height: 100vh;
  position: relative;
}

.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 4px 6px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-1);
}
.status-icons { display: flex; align-items: center; gap: 6px; }
.status-icons svg { display: block; }

.tabs {
  display: flex;
  gap: 22px;
  padding: 10px 0 14px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  font-size: 14px;
  color: var(--text-3);
  white-space: nowrap;
  padding-bottom: 4px;
  cursor: pointer;
  position: relative;
  transition: color 0.2s ease;
}
.tab.active {
  color: var(--text-1);
  font-weight: 700;
}
.tab.active::after {
  content: "";
  position: absolute;
  bottom: -2px; left: 50%;
  transform: translateX(-50%);
  width: 20px; height: 2px;
  background: var(--accent);
  border-radius: var(--radius-full);
}

.hero {
  margin-top: 8px;
  margin-bottom: var(--space-lg);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: var(--space-md);
  animation: slide-up 0.35s ease-out both;
}
.hero-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1.5px;
  margin-bottom: 6px;
}
.hero-title {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.25;
  color: var(--text-1);
  letter-spacing: -0.5px;
}
.hero-sub {
  font-size: 12px;
  color: var(--text-2);
  margin-top: 6px;
  line-height: 1.5;
}

.coin-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-1);
  border: 1px solid var(--bg-3);
  padding: 8px 12px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 700;
  color: var(--secondary);
  flex-shrink: 0;
  transition: all 0.3s;
}
.coin-badge.bump { animation: coinBump 0.5s ease-out; }
@keyframes coinBump {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.15); color: var(--accent-light); }
  100% { transform: scale(1); }
}

.cabinet {
  position: relative;
  background: var(--bg-1);
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-xl);
  padding: 22px 18px 18px;
  box-shadow: 0 16px 50px rgba(0,0,0,0.4);
  overflow: hidden;
  animation: slide-up 0.4s ease-out 0.05s both;
}
.cabinet.glow {
  box-shadow: 0 0 30px var(--accent-subtle), 0 16px 50px rgba(0,0,0,0.4);
  border-color: rgba(255, 96, 15, 0.4);
  transition: all 0.3s;
}
.cabinet-shimmer {
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,96,15,0.05), transparent);
  pointer-events: none;
  animation: shimmer 5s infinite;
}
@keyframes shimmer {
  0% { left: -60%; }
  100% { left: 160%; }
}

.bulbs {
  position: absolute;
  top: 10px; left: 16px; right: 16px;
  display: flex;
  justify-content: space-between;
  z-index: 2;
}
.bulb {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--bg-3);
}
.bulbs.on .bulb { animation: bulbBlink 0.7s infinite; }
.bulbs.on .bulb:nth-child(2n) { animation-delay: 0.1s; }
.bulbs.on .bulb:nth-child(3n) { animation-delay: 0.2s; }
.bulbs.on .bulb:nth-child(5n) { animation-delay: 0.3s; }
@keyframes bulbBlink {
  0%, 100% { background: var(--bg-3); box-shadow: none; }
  50% { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
}

.cabinet-title {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 14px;
  position: relative;
  z-index: 1;
}
.cabinet-title-text {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--accent);
}
.cabinet-title-line {
  flex: 0 1 50px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--bg-3), transparent);
}

.reels-wrap {
  background: var(--bg-0);
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-lg);
  padding: 14px;
  position: relative;
}
.reels-row {
  display: flex;
  gap: 8px;
  justify-content: center;
}
.reel {
  position: relative;
  flex: 1;
  height: 80px;
  overflow: hidden;
  border-radius: var(--radius-md);
  background: var(--bg-2);
}
.reel::before {
  content: "";
  position: absolute; inset: 0; z-index: 3;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.85) 100%);
}
.reel-strip {
  position: absolute; left: 0; right: 0; top: 0;
  will-change: transform;
}
.reel-item {
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
}
.reel-item svg {
  width: 36px; height: 36px;
  stroke-width: 1.5;
  fill: none;
  stroke: currentColor;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.reel-spin {
  animation: reelSpin 0.4s linear infinite;
  filter: blur(1.5px);
}
@keyframes reelSpin {
  from { transform: translateY(0); }
  to { transform: translateY(-800px); }
}
.reel-stop {
  transition: transform 0.95s cubic-bezier(0.16, 1, 0.3, 1);
  filter: blur(0);
}
.reel-glow {
  position: absolute; inset: 0; z-index: 4;
  border-radius: var(--radius-md);
  box-shadow: inset 0 0 0 2px var(--accent), 0 0 18px var(--accent-glow);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.reel.landed.win .reel-glow { opacity: 1; }
.reel.landed.win .reel-target { color: var(--accent); }
.reel.landed.win .reel-target {
  animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.reel.landed.coin .reel-target { color: var(--secondary); }
.reel.landed.coin .reel-target {
  animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.18); }
  100% { transform: scale(1); }
}

.status-line {
  margin-top: 14px;
  text-align: center;
  font-size: 12px;
  color: var(--text-2);
  min-height: 18px;
  transition: color 0.2s;
}
.status-line .ldot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  margin-right: 6px;
  vertical-align: middle;
  animation: pulseDot 0.8s infinite;
}
@keyframes pulseDot { 0%,100% { opacity:1; } 50% { opacity: 0.3; } }
.status-line.hot { color: var(--accent); font-weight: 600; }
.status-line.win { color: var(--accent); font-weight: 700; letter-spacing: 1px; }
.status-line.coin { color: var(--secondary); font-weight: 700; letter-spacing: 0.5px; }
.status-line.miss { color: var(--text-3); }

.cta-row {
  margin-top: 14px;
}
.btn-primary {
  width: 100%;
  background: var(--accent-gradient);
  color: #FFFFFF;
  font-weight: 700;
  font-size: 16px;
  padding: 14px 20px;
  border-radius: var(--radius-md);
  border: none;
  box-shadow: 0 4px 20px var(--accent-glow);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: inherit;
}
.btn-primary svg { width: 18px; height: 18px; stroke-width: 2; }
.btn-primary:active:not(:disabled) { transform: scale(0.97); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }
.btn-primary:not(:disabled):hover {
  box-shadow: 0 6px 30px rgba(255, 96, 15, 0.45);
}
.btn-primary.pulsing { animation: pulse-glow 1.4s ease-in-out infinite; }
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 4px 20px var(--accent-glow); }
  50% { box-shadow: 0 4px 30px rgba(255, 96, 15, 0.55); }
}

.sub-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
  gap: 10px;
  font-size: 11px;
  color: var(--text-3);
}
.chances-inline {
  display: flex;
  align-items: center;
  gap: 8px;
}
.chances-dots {
  display: flex;
  align-items: center;
  gap: 5px;
}
.chance-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--bg-3);
  transition: all 0.3s;
}
.chance-dot.active {
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent-glow);
}
.chances-meta {
  font-size: 11px;
  color: var(--text-2);
}
.chances-meta .recover {
  color: var(--text-3);
  margin-left: 4px;
  font-variant-numeric: tabular-nums;
}
.btn-coin {
  background: transparent;
  color: var(--secondary);
  border: 1px solid var(--bg-3);
  padding: 6px 10px;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: all 0.2s ease;
  white-space: nowrap;
  font-family: inherit;
}
.btn-coin svg { width: 12px; height: 12px; stroke-width: 1.8; fill: none; stroke: currentColor; }
.btn-coin:active:not(:disabled) { transform: scale(0.95); }
.btn-coin:not(:disabled):hover { border-color: rgba(255, 184, 0, 0.4); }
.btn-coin:disabled { color: var(--text-3); cursor: not-allowed; opacity: 0.6; }

.confetti-box { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.confetti {
  position: absolute;
  top: 50%; left: 50%;
  width: 6px; height: 10px;
  border-radius: 1px;
  opacity: 0;
}
.confetti.go { animation: blast 1s ease-out forwards; }
@keyframes blast {
  0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.4) rotate(0); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1) rotate(var(--rot)); }
}

.section {
  margin-top: var(--space-xl);
  animation: slide-up 0.4s ease-out both;
}
.section.s1 { animation-delay: 0.1s; }
.section.s2 { animation-delay: 0.15s; }
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-1);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title svg {
  width: 18px; height: 18px;
  stroke: var(--accent);
  stroke-width: 1.5; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}
.section-link {
  font-size: 12px;
  color: var(--text-2);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 2px;
}
.section-link svg { width: 14px; height: 14px; stroke-width: 1.5; fill: none; stroke: currentColor; }

.item-slot {
  background: var(--bg-1);
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-lg);
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}
.item-slot.has-item {
  border-color: rgba(255, 96, 15, 0.3);
  background: linear-gradient(135deg, var(--bg-1), var(--bg-accent));
}
.item-slot.flash { animation: itemFlash 0.6s ease-out; }
@keyframes itemFlash {
  0%   { transform: scale(1); box-shadow: 0 0 0 0 var(--accent-glow); }
  40%  { transform: scale(1.02); box-shadow: 0 0 30px var(--accent-glow); }
  100% { transform: scale(1); box-shadow: 0 0 0 0 transparent; }
}
.item-icon-box {
  width: 52px;
  height: 52px;
  border-radius: var(--radius-md);
  background: var(--bg-2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border: 1px solid var(--bg-3);
}
.item-slot.has-item .item-icon-box {
  background: var(--bg-accent);
  border-color: rgba(255, 96, 15, 0.4);
}
.item-icon-box svg {
  width: 28px; height: 28px;
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round; stroke-linejoin: round;
  stroke: var(--text-3);
}
.item-slot.has-item .item-icon-box svg { stroke: var(--accent); }
.item-info { flex: 1; min-width: 0; }
.item-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-1);
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}
.item-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  background: var(--accent-subtle);
  color: var(--accent);
}
.item-desc {
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.4;
}
.item-empty .item-name { color: var(--text-2); font-weight: 500; }
.item-empty .item-desc { color: var(--text-3); }

.leaderboard {
  background: var(--bg-1);
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.lb-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid var(--bg-2);
  transition: background 0.15s;
}
.lb-row:last-child { border-bottom: none; }
.lb-row.me { background: var(--bg-accent); }
.lb-row:active { background: var(--bg-2); }
.lb-rank {
  width: 22px;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
}
.lb-rank.top1 { color: var(--secondary); }
.lb-rank.top2 { color: #C0C0C0; }
.lb-rank.top3 { color: #CD7F32; }
.lb-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg-2);
  border: 1px solid var(--bg-3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-1);
  flex-shrink: 0;
}
.lb-row.me .lb-avatar {
  background: var(--accent-subtle);
  border-color: var(--accent);
  color: var(--accent);
}
.lb-name {
  flex: 1;
  font-size: 14px;
  color: var(--text-1);
}
.lb-row.me .lb-name { font-weight: 700; }
.lb-score {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.lb-footer {
  text-align: center;
  font-size: 11px;
  color: var(--text-3);
  margin-top: 10px;
}

.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 402px;
  margin: 0 auto;
  background: rgba(0, 0, 0, 0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--bg-3);
  display: flex;
  justify-content: space-around;
  padding: 8px 0 calc(6px + env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 10px;
  color: var(--text-3);
  cursor: pointer;
  font-size: 10px;
  transition: color 0.2s ease, transform 0.15s ease;
  min-width: 56px;
}
.nav-item.active { color: var(--accent); }
.nav-item:active { transform: scale(0.92); }
.nav-item svg {
  width: 22px; height: 22px;
  stroke-width: 1.5;
  fill: none;
  stroke: currentColor;
  stroke-linecap: round;
  stroke-linejoin: round;
}

@keyframes slide-up {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Icon showcase strip (debug视觉用) */
.icon-preview {
  display: none; /* 设为 flex 即可看到三枚图标的纯展示 */
}
</style>
</head>

  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <svg width="16" height="11" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="0.5"></rect><rect x="5" y="5" width="3" height="7" rx="0.5"></rect><rect x="10" y="2" width="3" height="10" rx="0.5"></rect><rect x="15" y="0" width="3" height="12" rx="0.5"></rect></svg>

      <svg width="24" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="currentColor" opacity="0.5"></rect><rect x="2" y="2" width="17" height="8" rx="1" fill="currentColor"></rect><rect x="23" y="4" width="2" height="4" rx="0.5" fill="currentColor" opacity="0.5"></rect></svg>
    </div>
  </div>

  <div class="tabs">
    <span class="tab">推荐</span>
    <span class="tab">关注</span>
    <span class="tab">发现</span>
    <span class="tab">科技</span>
    <span class="tab active">排位赛</span>
  </div>

  <div class="hero">
    <div>
      <div class="hero-label">RANKED MATCH</div>
      <div class="hero-title">60秒排位赛</div>
      <div class="hero-sub">摇老虎机抽道具 · 自动开战</div>
    </div>
    <div class="coin-badge" id="coinBadge">

<script>
  // ==================== ICONS ====================
  const SVG_EMPTY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="8" x2="16" y2="16"/><line x1="16" y1="8" x2="8" y2="16"/></svg>';

  const SVG_COIN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M14.5 9.5a2.5 2.5 0 0 0-5 0v5a2.5 2.5 0 0 0 5 0"/></svg>';

  // ============================================================
  // 重新设计的三枚卡牌图标（24x24 viewBox · stroke-width 1.5）
  // ============================================================

  // 🛡️ 护盾卡：盾牌外形 + 内嵌对勾
  // 设计语言：盾牌 = 防护，对勾 = "已成功挡下"。圆角棱角参考现代游戏 buff 图标。
  const SVG_SHIELD = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2.5 L4 5.2 V11.5 c0 4.8 3.2 8.7 8 10.3 c4.8 -1.6 8 -5.5 8 -10.3 V5.2 Z"/>
      <path d="M8.2 12 l2.6 2.6 l4.8 -5.2"/>
    </svg>`;

  // ❌ 排除卡：2×2 选项卡片网格 + 左上格被 X 划掉
  // 设计语言：直接画出 ABCD 选项的真实结构，X 落在其中一个上 = "去掉一个错误选项"
  const SVG_EXCLUDE = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3.5" width="8" height="7" rx="1.5"/>
      <rect x="13" y="3.5" width="8" height="7" rx="1.5"/>
      <rect x="3" y="13.5" width="8" height="7" rx="1.5"/>
      <rect x="13" y="13.5" width="8" height="7" rx="1.5"/>
      <line x1="4.8" y1="5.3" x2="9.2" y2="8.7"/>
      <line x1="9.2" y1="5.3" x2="4.8" y2="8.7"/>
    </svg>`;

  // 🕐 慢放卡：内层时钟 + 外层逆时针回放弧线箭头
  // 设计语言：内圈钟表 = 时间维度；外圈弧形箭头 = 音频 App 的"重听"通用语言
  const SVG_SLOW = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="13" r="5"/>
      <polyline points="12 10.5 12 13 14 14.2"/>
      <path d="M3.5 10 A9 9 0 0 1 19 6.5"/>
      <polyline points="3.5 5.5 3.5 10 8 10"/>
    </svg>`;

  // ==================== ITEMS ====================
  // 只保留 3 张卡，权重重新平衡为 50/30/20（合计 100%）
  // 反映稀有度梯度：护盾最常用 → 排除中等 → 慢放最稀有
  const ITEMS = {
    shield:  { name: '护盾卡', tag: 'BUFF', desc: '答错一次不打断 combo', icon: SVG_SHIELD,  weight: 50 },
    exclude: { name: '排除卡', tag: 'BUFF', desc: '去掉一个错误选项',     icon: SVG_EXCLUDE, weight: 30 },
    slow:    { name: '慢放卡', tag: 'BUFF', desc: '某题可慢速重听一次',    icon: SVG_SLOW,    weight: 20 }
  };
  const ITEM_KEYS = Object.keys(ITEMS);

  // 老虎机滚动符号池：5 种符号
  const REEL_SYMBOLS = [
    { id: 'empty',   svg: SVG_EMPTY },
    { id: 'coin',    svg: SVG_COIN },
    { id: 'shield',  svg: SVG_SHIELD },
    { id: 'exclude', svg: SVG_EXCLUDE },
    { id: 'slow',    svg: SVG_SLOW }
  ];

  const REEL_LEN = 30;
  const ITEM_H = 80;

  // ==================== STATE ====================
  let chances = 3;
  let coins = 2180;
  let purchasesToday = 0;
  let currentItem = null;
  let spinning = false;
  let recoverSeconds = 1 * 3600 + 23 * 60 + 45;

  // ==================== DOM ====================
  const reelsEls = document.querySelectorAll('.reel');
  const statusText = document.getElementById('statusText');
  const spinBtn = document.getElementById('spinBtn');
  const spinBtnText = document.getElementById('spinBtnText');
  const buyBtn = document.getElementById('buyBtn');
  const buyBtnText = document.getElementById('buyBtnText');
  const bulbs = document.getElementById('bulbs');
  const cabinet = document.getElementById('cabinet');
  const confettiBox = document.getElementById('confettiBox');
  const chanceLabel = document.getElementById('chanceLabel');
  const recoverLabel = document.getElementById('recoverLabel');
  const chanceDots = document.querySelectorAll('.chance-dot');
  const itemSlot = document.getElementById('itemSlot');
  const itemIcon = document.getElementById('itemIcon');
  const itemName = document.getElementById('itemName');
  const itemDesc = document.getElementById('itemDesc');
  const itemHint = document.getElementById('itemHint');
  const coinBadge = document.getElementById('coinBadge');
  const coinNum = document.getElementById('coinNum');

  // ==================== INIT REELS ====================
  const QMARK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
  reelsEls.forEach(el => {
    const strip = el.querySelector('.reel-strip');
    let html = '';
    for (let i = 0; i < REEL_LEN; i++) {
      const cls = (i === REEL_LEN - 2) ? 'reel-item reel-target' : 'reel-item';
      html += `<div class="${cls}">${QMARK}</div>`;
    }
    strip.innerHTML = html;
    strip.style.transform = `translateY(-${(REEL_LEN - 2) * ITEM_H}px)`;
  });

  // ==================== HELPERS ====================
  function setStatus(html, cls = '') {
    statusText.className = 'status-line' + (cls ? ' ' + cls : '');
    statusText.innerHTML = html;
  }

  function fmtTime(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function updateChances() {
    chanceLabel.textContent = `${chances} / 5`;
    chanceDots.forEach((d, i) => d.classList.toggle('active', i < chances));
    if (chances >= 5) {
      recoverLabel.textContent = '· 已满';
    } else {
      recoverLabel.textContent = `· ${fmtTime(recoverSeconds)} 后 +1`;
    }
  }

  function updateCoins(animate = false) {
    coinNum.textContent = coins.toLocaleString();
    if (animate) {
      coinBadge.classList.remove('bump');
      void coinBadge.offsetWidth;
      coinBadge.classList.add('bump');
    }
  }

  function updateBuyBtn() {
    buyBtnText.textContent = `100 +1次 (${purchasesToday}/3)`;
    const disabled = purchasesToday >= 3 || coins < 100 || chances >= 5;
    buyBtn.disabled = disabled;
  }

  function updateItemSlot(animate = false) {
    if (currentItem) {
      const it = ITEMS[currentItem];
      itemSlot.classList.remove('item-empty');
      itemSlot.classList.add('has-item');
      itemIcon.innerHTML = it.icon;
      itemName.innerHTML = `${it.name} <span class="item-tag">${it.tag}</span>`;
      itemDesc.textContent = it.desc;
      itemHint.textContent = '开战时自动带入';
      if (animate) {
        itemSlot.classList.remove('flash');
        void itemSlot.offsetWidth;
        itemSlot.classList.add('flash');
      }
    } else {
      itemSlot.classList.remove('has-item');
      itemSlot.classList.add('item-empty');
      itemIcon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
      itemName.textContent = '暂无道具';
      itemDesc.textContent = '摇老虎机有机会获得 · 30% 概率掉落';
      itemHint.textContent = '抽奖获得后挂载';
    }
  }

  function blastConfetti() {
    const colors = ['#FF600F', '#FF7A33', '#FFB800', '#FFFFFF'];
    for (let i = 0; i < 24; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.background = colors[i % colors.length];
      const angle = (Math.PI * 2 * i) / 24 + (Math.random() - 0.5) * 0.4;
      const dist = 90 + Math.random() * 80;
      c.style.setProperty('--tx', `calc(-50% + ${Math.cos(angle) * dist}px)`);
      c.style.setProperty('--ty', `calc(-50% + ${Math.sin(angle) * dist}px)`);
      c.style.setProperty('--rot', `${Math.random() * 720 - 360}deg`);
      confettiBox.appendChild(c);
      requestAnimationFrame(() => c.classList.add('go'));
      setTimeout(() => c.remove(), 1100);
    }
  }

  // ==================== REEL ANIM ====================
  function buildStrip(finalSymbolId) {
    let html = '';
    const finalSymbol = REEL_SYMBOLS.find(s => s.id === finalSymbolId);
    for (let i = 0; i < REEL_LEN; i++) {
      const sym = (i === REEL_LEN - 2) ? finalSymbol : REEL_SYMBOLS[Math.floor(Math.random() * REEL_SYMBOLS.length)];
      const cls = (i === REEL_LEN - 2) ? 'reel-item reel-target' : 'reel-item';
      html += `<div class="${cls}">${sym.svg}</div>`;
    }
    return html;
  }

  function startReel(reelEl) {
    const strip = reelEl.querySelector('.reel-strip');
    reelEl.classList.remove('landed', 'win', 'coin');
    let items = '';
    for (let i = 0; i < 10; i++) {
      const sym = REEL_SYMBOLS[Math.floor(Math.random() * REEL_SYMBOLS.length)];
      items += `<div class="reel-item">${sym.svg}</div>`;
    }
    strip.innerHTML = items;
    strip.classList.remove('reel-stop');
    strip.style.transition = 'none';
    strip.style.transform = 'translateY(0)';
    void strip.offsetWidth;
    strip.classList.add('reel-spin');
  }

  function stopReel(reelEl, finalSymbolId, resultType, cb) {
    const strip = reelEl.querySelector('.reel-strip');
    strip.classList.remove('reel-spin');
    strip.style.filter = 'blur(0)';
    strip.innerHTML = buildStrip(finalSymbolId);
    strip.style.transition = 'none';
    strip.style.transform = 'translateY(0)';
    void strip.offsetWidth;
    strip.style.transition = '';
    strip.classList.add('reel-stop');
    strip.style.transform = `translateY(-${(REEL_LEN - 2) * ITEM_H}px)`;
    setTimeout(() => {
      reelEl.classList.add('landed');
      if (resultType === 'item') reelEl.classList.add('win');
      else if (resultType === 'coin') reelEl.classList.add('coin');
      cb && cb();
    }, 950);
  }

  // ==================== DRAW LOGIC ====================
  function rollResult() {
    const r = Math.random();
    if (r < 0.40) {
      return { type: 'empty', symbolId: 'empty' };
    } else if (r < 0.70) {
      const amount = Math.floor(Math.random() * 41) + 10;
      return { type: 'coin', symbolId: 'coin', amount };
    } else {
      const totalW = Object.values(ITEMS).reduce((s, it) => s + it.weight, 0);
      let pick = Math.random() * totalW;
      for (const k of ITEM_KEYS) {
        pick -= ITEMS[k].weight;
        if (pick <= 0) return { type: 'item', symbolId: k, itemId: k };
      }
      return { type: 'item', symbolId: 'shield', itemId: 'shield' };
    }
  }

  // ==================== SPIN ====================
  function spin() {
    if (spinning) return;
    if (chances <= 0) {
      setStatus('次数已用完 · 用金币购买或等待恢复', 'hot');
      return;
    }
    spinning = true;
    chances -= 1;
    updateChances();
    updateBuyBtn();

    const result = rollResult();
    const finalSymbols = [result.symbolId, result.symbolId, result.symbolId];

    spinBtn.disabled = true;
    spinBtn.classList.remove('pulsing');
    spinBtnText.textContent = '抽取中';
    bulbs.classList.add('on');
    cabinet.classList.add('glow');
    setStatus('<span class="ldot"></span>滚动中…', 'hot');

    reelsEls.forEach(el => startReel(el));

    const delays = [800, 1100, 1400];
    let stopped = 0;
    delays.forEach((d, i) => {
      setTimeout(() => {
        stopReel(reelsEls[i], finalSymbols[i], result.type, () => {
          stopped++;
          if (stopped === 3) onSpinDone(result);
        });
      }, d);
    });
  }

  function onSpinDone(result) {
    bulbs.classList.remove('on');

    if (result.type === 'empty') {
      setStatus('未中奖 · 准备进入对战', 'miss');
    } else if (result.type === 'coin') {
      coins += result.amount;
      updateCoins(true);
      setStatus(`+${result.amount} 金币 · 准备进入对战`, 'coin');
      blastConfetti();
    } else if (result.type === 'item') {
      currentItem = result.itemId;
      updateItemSlot(true);
      const it = ITEMS[result.itemId];
      setStatus(`获得 ${it.name} · 已挂载`, 'win');
      blastConfetti();
    }

    setTimeout(() => {
      spinBtnText.textContent = '即将进入对战…';
    }, 100);

    setTimeout(() => {
      spinning = false;
      spinBtn.disabled = false;
      spinBtnText.textContent = currentItem ? '开战 · 带入道具' : '开战';
      cabinet.classList.remove('glow');
      spinBtn.classList.add('pulsing');
      updateBuyBtn();
    }, 1800);
  }

  // ==================== BUY ====================
  function buyChance() {
    if (purchasesToday >= 3) return;
    if (coins < 100) return;
    if (chances >= 5) return;
    coins -= 100;
    chances += 1;
    purchasesToday += 1;
    updateCoins(true);
    updateChances();
    updateBuyBtn();
    setStatus(`已购买 1 次 · 剩余 ${chances}/5`, 'coin');
    setTimeout(() => {
      if (!spinning) setStatus('点击开战 · 消耗 1 次 · 自动抽奖入场', '');
    }, 1500);
  }

  // ==================== TIMERS ====================
  setInterval(() => {
    if (chances < 5) {
      recoverSeconds--;
      if (recoverSeconds <= 0) {
        chances = Math.min(5, chances + 1);
        recoverSeconds = 2 * 3600;
        updateChances();
        updateBuyBtn();
      } else {
        recoverLabel.textContent = `· ${fmtTime(recoverSeconds)} 后 +1`;
      }
    }
  }, 1000);

  // ==================== EVENTS ====================
  spinBtn.addEventListener('click', spin);
  buyBtn.addEventListener('click', buyChance);

  // ==================== INIT ====================
  updateChances();
  updateCoins();
  updateBuyBtn();
  updateItemSlot();
</script>


</body></html>
